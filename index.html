<script>
// 🔑 Gera event_id único por sessão (útil para CAPI no futuro)
function gerarEventId() {
  return 'purchase_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
}

// ✅ Dispara Purchase na chegada, com deduplicação por sessionStorage
const chaveDedup = 'purchase_fired';

if (!sessionStorage.getItem(chaveDedup)) {
  sessionStorage.setItem(chaveDedup, '1');

  const eventId = gerarEventId();

  fbq('trackSingle', '2037756700442031', 'Purchase', {
    value: 9.70,
    currency: 'BRL',
    event_id: eventId  // para deduplicar com CAPI no futuro
  });
}
</script>

<style>
body {
  margin: 0; padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #111;
  font-family: Arial, sans-serif;
}
button {
  padding: 20px 40px;
  font-size: 22px;
  border: none;
  border-radius: 12px;
  background: #00c853;
  color: #fff;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}
button:hover { background: #00b248; }
button:disabled { background: #555; cursor: not-allowed; }
</style>

<body>

<button id="btnConteudo">VER OS CONTEÚDOS</button>

<script>
const botao = document.getElementById("btnConteudo");
let clicado = false;

botao.addEventListener("click", function () {
  if (clicado) return;
  clicado = true;
  botao.disabled = true;
  botao.innerText = "REDIRECIONANDO...";

  setTimeout(function () {
    window.location.href = "https://chamada-de-video-three.vercel.app/";
  }, 800);
});
</script>
